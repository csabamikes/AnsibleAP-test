---
- name: OpenSCAP vizsgálat, XML mentés és Offline Playbook generálás
  hosts: rhel9-01.example.com
  become: yes
  vars:
    target_rule: "xccdf_org.ssgproject.content_rule_sshd_disable_root_login"
    scap_ds: "/usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml"
    # Az AAP fizikai gép címe és a célmappa
    aap_host_address: "192.168.1.185"
    aap_destination_dir: "/home/ansible/oscap_reports/{{ inventory_hostname }}"

  tasks:
    - name: OpenSCAP csomagok telepítése a vizsgált gépen
      dnf:
        name: [openscap-scanner, scap-security-guide]
        state: present

    - name: Időbélyeg generálása
      set_fact:
        timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    - name: Vizsgálat futtatása és RESULTS.XML generálása
      command: >
        oscap xccdf eval 
        --rule {{ target_rule }}
        --results /tmp/results_{{ inventory_hostname }}.xml
        --report /tmp/report_{{ inventory_hostname }}.html
        {{ scap_ds }}
      register: oscap_result
      failed_when: false # Nem akarjuk, hogy leálljon, ha találatot jelez (rc=2)

    - name: 1. Lépés - Eredmények áthúzása az AAP konténerbe
      fetch:
        src: "/tmp/{{ item }}_{{ inventory_hostname }}{{ '.xml' if item == 'results' else '.html' }}"
        dest: "/tmp/oscap_sync/{{ inventory_hostname }}/"
        flat: yes
      loop:
        - results
        - report

    - name: 2. Lépés - Könyvtár biztosítása az AAP hoston
      file:
        path: "{{ aap_destination_dir }}"
        state: directory
        mode: '0755'
        owner: ansible
      delegate_to: "{{ aap_host_address }}"
      become: yes

    - name: 3. Lépés - XML és HTML másolása az AAP hostra
      copy:
        src: "/tmp/oscap_sync/{{ inventory_hostname }}/{{ item.file }}"
        dest: "{{ aap_destination_dir }}/{{ item.name }}_{{ timestamp }}{{ item.ext }}"
      loop:
        - { name: 'results', file: "results_{{ inventory_hostname }}.xml", ext: '.xml' }
        - { name: 'report', file: "report_{{ inventory_hostname }}.html", ext: '.html' }
      delegate_to: "{{ aap_host_address }}"
      become: yes

    - name: 4. Lépés - OFFLINE REMEDIATION PLAYBOOK GENERÁLÁSA az AAP hoston
      command: >
        oscap xccdf generate fix --fix-type ansible 
        --result-id "" 
        --output {{ aap_destination_dir }}/remediation_{{ timestamp }}.yml 
        {{ aap_destination_dir }}/results_{{ timestamp }}.xml
      delegate_to: "{{ aap_host_address }}"
      become: yes

    - name: Takarítás a távoli gépen
      file:
        path: "/tmp/{{ item }}_{{ inventory_hostname }}{{ '.xml' if item == 'results' else '.html' }}"
        state: absent
      loop:
        - results
        - report
