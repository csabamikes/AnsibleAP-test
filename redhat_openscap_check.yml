---
- name: OpenSCAP vizsgálat és közvetlen másolás az AAP hostra
  hosts: all
  become: yes
  vars:
    target_rule: "xccdf_org.ssgproject.content_rule_sshd_disable_root_login"
    scap_ds: "/usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml"
    # Az AAP host elérhetősége és a célmappa
    aap_host_address: "192.168.1.185"  # CSERÉLD KI az AAP szervered valódi IP címére!
    aap_destination_dir: "/home/ansible/oscap_reports/{{ inventory_hostname }}"

  tasks:
    - name: OpenSCAP csomagok telepítése
      dnf:
        name: [openscap-scanner, scap-security-guide]
        state: present

    - name: Időbélyeg generálása
      set_fact:
        timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M') }}"

    - name: Vizsgálat futtatása a távoli gépen
      command: >
        oscap xccdf eval 
        --rule {{ target_rule }}
        --report /tmp/report.html
        {{ scap_ds }}
      register: oscap_result
      failed_when: false

    - name: Jelentés átküldése a távoli gépről KÖZVETLENÜL az AAP hostra
      shell: >
        scp -o StrictHostKeyChecking=no /tmp/report.html 
        ansible@{{ aap_host_address }}:{{ aap_destination_dir }}/report_{{ timestamp }}.html
      delegate_to: "{{ inventory_hostname }}"
      
    - name: Ideiglenes fájl törlése a vizsgált gépről
      file:
        path: /tmp/report.html
        state: absent

- name: Jogosultságok javítása az AAP hoston (Opcionális)
  hosts: localhost
  connection: local
  tasks:
    - name: Üzenet a mentés befejezéséről
      debug:
        msg: "A jelentések az AAP host {{ aap_destination_dir }} mappájába kerültek."
