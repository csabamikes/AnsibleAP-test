---
# ====================================================================
# 1. PLAY: Távoli hostok előkészítése (EPEL bekapcsolása és csomagok)
# ====================================================================
- name: Távoli hostok előkészítése (Python csomagok telepítése)
  hosts: all
  gather_facts: false
  tasks:
    - name: Előfizetési tanúsítványok frissítése a Satellite-ból
      ansible.builtin.command: subscription-manager refresh
      become: true
      register: sm_refresh
      changed_when: "'All local certificates updated' in sm_refresh.stdout"

 #   - name: Az EPEL repository engedélyezése a hoston
 #     community.general.rhsm_repository:
 #       name: "Default_Organization_EPEL_EPEL-9-Repo"  # <--- FIGYELEM: Ha a Satellite-ban más a repo label-ed, írd át!
 #       state: enabled
 #     become: true

    - name: DNF gyorsítótár ürítése az új csatorna észlelése érdekében
      ansible.builtin.command: dnf clean all
      become: true
      changed_when: true

    - name: Előfeltételek biztosítása a távoli gépeken
      ansible.builtin.package:
        name:
          - python3-pandas
          - python3-openpyxl
        state: present
      become: true

# ====================================================================
# 2. PLAY: Lekérdezés a Satellite-ból és mentés a kiválasztott hostra
# ====================================================================
- name: Satellite hostok és errata adatok lekérdezése, Excel riport készítése
  hosts: localhost
  gather_facts: false
  vars:
    # --- SATELLITE BEÁLLÍTÁSOK ---
    satellite_url: "https://satellite-01-example.com"
    satellite_username: "admin"
    satellite_password: "root123"
    satellite_validate_certs: false
    
    # --- JELENTÉS BEÁLLÍTÁSAI ---
    output_dir: "/home/ansible/satellite-errata-report"
    output_filename: "satellite_errata_riport.xlsx"
    
    # --- CÉLHOST (Ahová a riportot menteni kell) ---
    target_host: "rhel9-02" # <--- Ide írd be annak a távoli gépnek a nevét, ahol a /home/ansible mappa van!

  tasks:
    - name: Hostok és kapcsolódó errata adatok lekérése a Satellite-ból
      redhat.satellite.host_info:
        server_url: "{{ satellite_url }}"
        username: "{{ satellite_username }}"
        password: "{{ satellite_password }}"
        validate_certs: "{{ satellite_validate_certs }}"
      register: satellite_hosts_raw

    - name: Adatok strukturálása és előkészítése a riport számára
      ansible.builtin.set_fact:
        host_report_data: >-
          {{
            host_report_data | default([]) + [{
              'Hostnév': item.name,
              'Operációs rendszer': item.operatingsystem_name | default('Ismeretlen'),
              'Környezet (Lifecycle)': item.lifecycle_environment_name | default('Nincs'),
              'Összes Errata': (item.content_facet_attributes.applicable_errata_count | default(0)),
              'Biztonsági (Security) Errata': (item.content_facet_attributes.errata_counts.security | default(0)),
              'Hibajavító (Bugfix) Errata': (item.content_facet_attributes.errata_counts.bugfix | default(0)),
              'Fejlesztési (Enhancement) Errata': (item.content_facet_attributes.errata_counts.enhancement | default(0))
            }]
          }}
      loop: "{{ satellite_hosts_raw.hosts }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Célkönyvtár ellenőrzése a TÁVOLI hoston
      ansible.builtin.file:
        path: "{{ output_dir }}/satellite-errata-report"
        state: directory
        mode: '0755'
      delegate_to: "{{ target_host }}"

    - name: Python script legenerálása sablonból a távoli hoston
      ansible.builtin.copy:
        dest: "{{ output_dir }}/generate_report.py"
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import pandas as pd
          import json
          import os

          # Az Ansible által átadott adatok biztonságos beágyazása
          data = {{ host_report_data | to_json }}

          df = pd.DataFrame(data)
          df = df[['Hostnév', 'Operációs rendszer', 'Környezet (Lifecycle)', 'Összes Errata', 'Biztonsági (Security) Errata', 'Hibajavító (Bugfix) Errata', 'Fejlesztési (Enhancement) Errata']]

          # Győződjünk meg róla, hogy a mappa létezik
          os.makedirs('{{ output_dir }}/satellite-errata-report', exist_ok=True)

          # Mentés Excel formátumban
          output_path = '{{ output_dir }}/satellite-errata-report/{{ output_filename }}'
          with pd.ExcelWriter(output_path, engine='openpyxl') as writer:
              df.to_excel(writer, index=False, sheet_name='Errata Riport')
          print(f"Sikeres mentés: {output_path}")
      delegate_to: "{{ target_host }}"

    - name: A legenerált Python script lefuttatása az Excel elkészítéséhez
      ansible.builtin.command:
        cmd: "python3 {{ output_dir }}/generate_report.py"
      register: script_output
      delegate_to: "{{ target_host }}"

    - name: Ideiglenes Python script törlése (Takarítás)
      ansible.builtin.file:
        path: "{{ output_dir }}/generate_report.py"
        state: absent
      delegate_to: "{{ target_host }}"

    - name: Visszajelzés a sikeres mentésről
      ansible.builtin.debug:
        msg: "Az Excel riport sikeresen elkészült a távoli gépen: {{ target_host }}:{{ output_dir }}/satellite-errata-report/{{ output_filename }}"
