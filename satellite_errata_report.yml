---
- name: Satellite hostok és errata adatok lekérdezése, Excel report készítése (Content View bontásban)
  hosts: localhost
  gather_facts: false
  vars:
    # --- SATELLITE BEÁLLÍTÁSOK ---
    satellite_url: "https://satellite-01.example.com"
    satellite_validate_certs: false
    # --- JELENTÉS BEÁLLÍTÁSAI ---
    output_dir: "/home/ansible/satellite-errata-report"
    # A fájlnév végéhez dinamikusan hozzáfűzzük az aktuális dátumot és időt YYYYMMDD_HHMM formátumban
    output_filename: "satellite_errata_report_{{ now(fmt='%Y%m%d_%H%M') }}.xlsx"
    # --- CÉLHOST (Ahová a reportot menteni kell) ---
    target_host: "rhel9-02" 
  tasks:
    - name: Hostok és kapcsolódó errata adatok lekérése a Satellite-ból
      redhat.satellite.host_info:
        server_url: "{{ satellite_url }}"
        username: "{{ lookup('ansible.builtin.env', 'SATELLITE_USER_API') }}"
        password: "{{ lookup('ansible.builtin.env', 'SATELLITE_PASS_API') }}"
        validate_certs: "{{ satellite_validate_certs }}"
      register: satellite_hosts_raw

    - name: Adatok strukturálása és előkészítése a report számára
      ansible.builtin.set_fact:
        host_report_data: >-
          {{
            host_report_data | default([]) + [{
              'Content View': item.content_facet_attributes.content_view.name | default('Nincs CV / Ismeretlen'),
              'Hostnév': item.name,
              'Operációs rendszer': item.operatingsystem_name | default('Ismeretlen'),
              'Környezet (Lifecycle ID)': item.content_facet_attributes.lifecycle_environment.name | default('Nincs'),
              'Összes Errata': item.content_facet_attributes.errata_counts.total | default(0) | int,
              'Biztonsági (Security) Errata': (item.content_facet_attributes.errata_counts.security | default(0)),
              'Hibajavító (Bugfix) Errata': (item.content_facet_attributes.errata_counts.bugfix | default(0)),
              'Fejlesztési (Enhancement) Errata': (item.content_facet_attributes.errata_counts.enhancement | default(0))
            }]
          }}
      loop: "{{ satellite_hosts_raw.hosts }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Célkönyvtár ellenőrzése (ha nem létezik, akkor létrehozása) a távoli hoston
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'
      delegate_to: "{{ target_host }}"

    - name: Biztosítjuk, hogy a python openpyxl és pandas telepítve legyen a célgépen
      ansible.builtin.pip:
        name: 
          - openpyxl
          - pandas
        state: present
      delegate_to: "{{ target_host }}"

    - name: Nyers adatok átmásolása JSON fájlként a távoli hostra
      ansible.builtin.copy:
        dest: "{{ output_dir }}/satellite_data.json"
        content: "{{ host_report_data | to_json }}"
        mode: '0644'
      delegate_to: "{{ target_host }}"

    - name: Python script legenerálása a távoli hoston (Adatbeolvasás JSON-ből)
      ansible.builtin.copy:
        dest: "{{ output_dir }}/generate_report.py"
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import pandas as pd
          import json
          import os
          from openpyxl.utils import get_column_letter
          from openpyxl.styles import PatternFill, Font
          json_path = '{{ output_dir }}/satellite_data.json'
          with open(json_path, 'r', encoding='utf-8') as f:
              data = json.load(f)
          df = pd.DataFrame(data)
          elvart_oszlopok = [
              'Content View', 'Hostnév', 'Operációs rendszer', 'Környezet (Lifecycle ID)', 
              'Összes Errata', 'Biztonsági (Security) Errata', 
              'Hibajavító (Bugfix) Errata', 'Fejlesztési (Enhancement) Errata'
          ]
          for oszlop in elvart_oszlopok:
              if oszlop not in df.columns:
                  df[oszlop] = 'Nincs'
          df = df[elvart_oszlopok]
          if not df.empty:
              df = df.sort_values(by=['Content View', 'Hostnév']).reset_index(drop=True)
          os.makedirs('{{ output_dir }}', exist_ok=True)
          output_path = '{{ output_dir }}/{{ output_filename }}'
          with pd.ExcelWriter(output_path, engine='openpyxl') as writer:
              df.to_excel(writer, index=False, sheet_name='Errata Report')
              wb = writer.book
              
              # --- STÍLUSOK DEFINIÁLÁSA ---
              header_fill = PatternFill(start_color="D3D3D3", end_color="D3D3D3", fill_type="solid")
              header_font = Font(bold=True)
              # --- AUTOMATIKUS FORMATÁLÁS ÉS OSZLOPSZÉLESSÉG ---
              for sheet_name in wb.sheetnames:
                  ws = wb[sheet_name]
                  
                  # Auto szűrő bekapcsolása a teljes adattáblára az aktuális munkalapon
                  ws.auto_filter.ref = ws.dimensions
                  
                  # Az első sor (fejléc) rögzítése / lefagyasztása
                  ws.freeze_panes = 'A2'
                  
                  # Kizárólag a legelső sor (fejléc) celláinak formázása szürkére és félkövérre
                  for cell in ws[1]:
                      cell.fill = header_fill
                      cell.font = header_font
                  # Oszlopszélességek igazítása az oszlopindex alapján (1-től indul)
                  for col_idx in range(1, ws.max_column + 1):
                      max_len = 0
                      col_letter = get_column_letter(col_idx)
                      for row_idx in range(1, ws.max_row + 1):
                          cell_value = ws.cell(row=row_idx, column=col_idx).value
                          if cell_value is not None:
                              max_len = max(max_len, len(str(cell_value)))
                      ws.column_dimensions[col_letter].width = max(max_len + 3, 12)
              print(f"Sikeres mentés: {output_path}")
      delegate_to: "{{ target_host }}"

    - name: A legenerált Python script lefuttatása az Excel elkészítéséhez
      ansible.builtin.command:
        cmd: "python3 {{ output_dir }}/generate_report.py"
      delegate_to: "{{ target_host }}"

    - name: Ideiglenes Python és JSON fájlok törlése (Takarítás)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ output_dir }}/generate_report.py"
        - "{{ output_dir }}/satellite_data.json"
      delegate_to: "{{ target_host }}"

    - name: Visszajelzés a sikeres mentésről
      ansible.builtin.debug:
        msg: "Az Excel report sikeresen elkészült a távoli gépen: {{ target_host }}:{{ output_dir }}/{{ output_filename }}"
