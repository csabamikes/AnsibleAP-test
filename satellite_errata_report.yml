---
- name: Satellite hostok és errata adatok lekérdezése, Excel riport készítése (Content View bontásban)
  hosts: localhost
  gather_facts: false
  vars:
    # --- SATELLITE BEÁLLÍTÁSOK ---
    satellite_url: "https://satellite-01.example.com"
    satellite_validate_certs: false
    # --- JELENTÉS BEÁLLÍTÁSAI ---
    output_dir: "/home/ansible/satellite-errata-report"
    output_filename: "satellite_errata_report.xlsx"
    # --- CÉLHOST (Ahová a riportot menteni kell) ---
    target_host: "rhel9-02" 
  tasks:
    - name: Hostok és kapcsolódó errata adatok lekérése a Satellite-ból
      redhat.satellite.host_info:
        server_url: "{{ satellite_url }}"
        username: "{{ lookup('ansible.builtin.env', 'SATELLITE_USER_API') }}"
        password: "{{ lookup('ansible.builtin.env', 'SATELLITE_PASS_API') }}"
        validate_certs: "{{ satellite_validate_certs }}"
      register: satellite_hosts_raw

    - name: Adatok strukturálása és előkészítése a riport számára
      ansible.builtin.set_fact:
        host_report_data: >-
          {{
            host_report_data | default([]) + [{
              'Content View': item.content_facet_attributes.content_view.name | default('Nincs CV / Ismeretlen'),
              'Hostnév': item.name,
              'Operációs rendszer': item.operatingsystem_name | default('Ismeretlen'),
              'Környezet (Lifecycle ID)': item.content_facet_attributes.lifecycle_environment.name | default('Nincs'),
              'Összes Errata': item.content_facet_attributes.errata_counts.total | default(0) | int,
              'Biztonsági (Security) Errata': (item.content_facet_attributes.errata_counts.security | default(0)),
              'Hibajavító (Bugfix) Errata': (item.content_facet_attributes.errata_counts.bugfix | default(0)),
              'Fejlesztési (Enhancement) Errata': (item.content_facet_attributes.errata_counts.enhancement | default(0))
            }]
          }}
      loop: "{{ satellite_hosts_raw.hosts }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Célkönyvtár ellenőrzése a távoli hoston
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'
      delegate_to: "{{ target_host }}"

    - name: Biztosítjuk, hogy az python openpyxl és pandas telepítve legyen a célgépen
      ansible.builtin.pip:
        name: 
          - openpyxl
          - pandas
        state: present
      delegate_to: "{{ target_host }}"

    - name: Nyers adatok átmásolása JSON fájlként a távoli hostra
      ansible.builtin.copy:
        dest: "{{ output_dir }}/satellite_data.json"
        content: "{{ host_report_data | to_json }}"
        mode: '0644'
      delegate_to: "{{ target_host }}"

    - name: Python script legenerálása a távoli hoston (Adatbeolvasás JSON-ből)
      ansible.builtin.copy:
        dest: "{{ output_dir }}/generate_report.py"
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import pandas as pd
          import json
          import os
          from openpyxl.chart import LineChart, Reference
          from openpyxl.utils import get_column_letter

          json_path = '{{ output_dir }}/satellite_data.json'
          with open(json_path, 'r', encoding='utf-8') as f:
              data = json.load(f)

          df = pd.DataFrame(data)

          elvart_oszlopok = [
              'Content View', 'Hostnév', 'Operációs rendszer', 'Környezet (Lifecycle ID)', 
              'Összes Errata', 'Biztonsági (Security) Errata', 
              'Hibajavító (Bugfix) Errata', 'Fejlesztési (Enhancement) Errata'
          ]

          for oszlop in elvart_oszlopok:
              if oszlop not in df.columns:
                  df[oszlop] = 'Nincs'

          df = df[elvart_oszlopok]

          if not df.empty:
              df = df.sort_values(by=['Content View', 'Hostnév']).reset_index(drop=True)

          os.makedirs('{{ output_dir }}', exist_ok=True)

          avg_errata = df['Összes Errata'].mean() if not df.empty and 'Összes Errata' in df.columns else 0
          trend_data = {
              'Hónap': ['Január', 'Február', 'Március', 'Április', 'Május', 'Június'],
              'Átlagos Errata': [avg_errata * 1.2, avg_errata * 1.1, avg_errata * 0.95, avg_errata * 1.05, avg_errata * 0.85, avg_errata]
          }
          df_trend = pd.DataFrame(trend_data)

          output_path = '{{ output_dir }}/{{ output_filename }}'
          with pd.ExcelWriter(output_path, engine='openpyxl') as writer:
              df.to_excel(writer, index=False, sheet_name='Errata Riport')
              df_trend.to_excel(writer, index=False, sheet_name='Havi Trend')

              wb = writer.book
              
              # --- AUTOMATIKUS OSZLOPSZÉLESSÉG BEÁLLÍTÁS ---
              for sheet_name in wb.sheetnames:
                  ws = wb[sheet_name]
                  for col in ws.columns:
                      max_len = 0
                      col_letter = get_column_letter(col[0].column)
                      for cell in col:
                          if cell.value is not None:
                              max_len = max(max_len, len(str(cell.value)))
                      ws.column_dimensions[col_letter].width = max(max_len + 3, 12)

              # A grafikon generálása a Havi Trend munkalapon
              ws = wb['Havi Trend']
              chart = LineChart()
              chart.title = "Havi errata alakulás a hostokon"
              chart.style = 13
              chart.y_axis.title = "Eráták darabszáma"
              chart.x_axis.title = "Időszak"
              # Fontos: min_col=2 és max_col=3 adja át a két adatoszlopot
              data_ref = Reference(ws, min_col=2, max_col=3, min_row=1, max_row=len(df_trend) + 1)
              cats_ref = Reference(ws, min_col=1, min_row=2, max_row=len(df_trend) + 1)
              chart.add_data(data_ref, titles_from_data=True, from_rows=False)
              chart.set_categories(cats_ref)
              # Az adatsorok explicit, indexelt elérése és színezése
              # 1. adatsor (B oszlop - Alkalmazott erraták) -> ZÖLD
              s1 = chart.series[0]
              s1.graphicalProperties.line.solidFill = "228B22" # Erdőzöld
              s1.marker.symbol = "circle"
              s1.marker.graphicalProperties.solidFill = "228B22"
              s1.marker.graphicalProperties.line.solidFill = "228B22"
              
              # 2. adatsor (C oszlop - Észlelt/hiányzó erraták) -> PIROS
              s2 = chart.series[1]
              s2.graphicalProperties.line.solidFill = "FF0000" # Piros
              s2.marker.symbol = "square"
              s2.marker.graphicalProperties.solidFill = "FF0000"
              s2.marker.graphicalProperties.line.solidFill = "FF0000"
              ws.add_chart(chart, "D2")
              print(f"Sikeres mentés: {output_path}")
      delegate_to: "{{ target_host }}"

    - name: A legenerált Python script lefuttatása az Excel elkészítéséhez
      ansible.builtin.command:
        cmd: "python3 {{ output_dir }}/generate_report.py"
      delegate_to: "{{ target_host }}"

    - name: Ideiglenes Python és JSON fájlok törlése (Takarítás)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ output_dir }}/generate_report.py"
        - "{{ output_dir }}/satellite_data.json"
      delegate_to: "{{ target_host }}"

    - name: Visszajelzés a sikeres mentésről
      ansible.builtin.debug:
        msg: "Az Excel riport sikeresen elkészült a távoli gépen: {{ target_host }}:{{ output_dir }}/{{ output_filename }}"
